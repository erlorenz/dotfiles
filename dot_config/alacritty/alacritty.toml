[env]
TERM = "xterm-256color"

[terminal]
osc52 = "CopyPaste"

[font]
size = 16
normal = { family = "JetBrains Mono", style = "Regular" }
bold = { family = "JetBrains Mono", style = "Bold" }
italic = { family = "JetBrains Mono", style = "Italic" }

[window]
padding.x = 14
padding.y = 14
decorations = "None"

[scrolling]
history = 50000

# Theme: Tokyo Night
[general]
import = ["~/.config/alacritty/themes/themes/tokyo-night.toml"]
